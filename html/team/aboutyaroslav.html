<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профіль - Співак Ярослав</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #24292e;
            line-height: 1.5;
            padding: 20px;
        }
        .profile-card {
            max-width: 600px;
            margin: 0 auto;
            padding: 24px;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            background-color: #f6f8fa;
        }
        .profile-name {
            font-size: 24px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 16px;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 8px;
        }
        .profile-info {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .profile-info li {
            margin-bottom: 8px;
            font-size: 16px;
        }
        .icon {
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h1 class="profile-name">Співак Ярослав Євгенович</h1>
        <ul class="profile-info">
            <li><span class="icon">📅</span><strong>Дата народження:</strong> 27 листопада 2007 року</li>
            <li><span class="icon">🎓</span><strong>Освіта:</strong> Студент Харківського національного університету</li>
            <li><span class="icon">💻</span><strong>Про мене:</strong> Починаючий розробник / Студент <i></i></li>
        </ul>
    </div>

</body>
</html>
