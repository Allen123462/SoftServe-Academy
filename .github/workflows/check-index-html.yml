name: Check Index HTML
on:
  workflow_dispatch:

jobs:
  check-and-commit:
    runs-on: ubuntu-latest
    steps:
      # 1. Завантажуємо репозиторій повністю (fetch-depth: 0 дозволяє бачити всі гілки)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TASK_TOKEN }}

      # 2. Запуск вашого скрипта перевірки
      - name: Run check script
        id: check_file
        run: |
          chmod +x check_index.sh
          ./check_index.sh
        continue-on-error: true
        
    # 3. Оновлення README безпосередньо в гілці master
      - name: Update README on master branch
        if: steps.check_file.outcome == 'success'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin master
          
          git checkout master
          
          echo -e "\nBranch: ${{ github.ref_name }} - index.html існує ✅" >> README.md

          git add README.md
          git commit -m "Update README: index.html found in ${{ github.ref_name }}"
          
          git push origin master
